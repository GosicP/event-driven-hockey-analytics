spring.application.name=event-driven-hockey-analytics

spring.datasource.url=jdbc:postgresql://localhost:5432/hockey_db
spring.datasource.username=hockey
spring.datasource.password=hockey

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

logging.level.liquibase=INFO
logging.level.org.springframework.boot.autoconfigure.liquibase=INFO
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=hockey-analytics-service
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.hockey.analytics.model

spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.hockey.analytics.model.GameEvent

hockey.kafka.topic.game-events=game-events