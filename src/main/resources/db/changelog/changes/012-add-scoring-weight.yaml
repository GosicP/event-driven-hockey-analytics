databaseChangeLog:
  - changeSet:
      id: 012-add-scoring-weight-column
      author: pavle
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: players
                columnName: scoring_weight
      changes:
        - addColumn:
            tableName: players
            columns:
              - column:
                  name: scoring_weight
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false

  - changeSet:
